<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصيلة — تسجيل الدخول</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%233B2415'/%3E%3Ccircle cx='20' cy='20' r='19' fill='none' stroke='%23D9A94E' stroke-width='1.5'/%3E%3Cg transform='translate(20,26)' stroke='%23D9A94E' stroke-width='1.3' fill='%23D9A94E'%3E%3Cpath d='M0,0 C4,-6 5,-14 0,-20 C-5,-14 -4,-6 0,0 Z' transform='rotate(-24)'/%3E%3Cpath d='M0,0 C4,-6 5,-14 0,-20 C-5,-14 -4,-6 0,0 Z'/%3E%3Cpath d='M0,0 C4,-6 5,-14 0,-20 C-5,-14 -4,-6 0,0 Z' transform='rotate(24)'/%3E%3Cpath d='M-7,2 Q0,6 7,2' fill='none'/%3E%3C/g%3E%3C/svg%3E">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg class="emblem" viewBox="0 0 200 200" role="img" aria-hidden="true">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#EFC876"/>
            <stop offset="100%" stop-color="#B3812C"/>
          </linearGradient>
        </defs>
        <circle cx="100" cy="100" r="94" fill="#3B2415"/>
        <circle cx="100" cy="100" r="94" fill="none" stroke="url(#ringGrad)" stroke-width="4"/>
        <circle cx="100" cy="100" r="78" fill="none" stroke="#D9A94E" stroke-width="1.4" stroke-dasharray="3 7" opacity="0.65"/>
        <g transform="translate(100,132)" fill="#D9A94E" stroke="#D9A94E">
          <path d="M0,0 C8,-13 10,-31 0,-50 C-10,-31 -8,-13 0,0 Z" transform="rotate(-38)" stroke-width="0.6"/>
          <path d="M0,0 C8,-14 10,-36 0,-60 C-10,-36 -8,-14 0,0 Z" transform="rotate(-19)" stroke-width="0.6"/>
          <path d="M0,0 C8,-16 10,-39 0,-66 C-10,-39 -8,-16 0,0 Z" stroke-width="0.6"/>
          <path d="M0,0 C8,-14 10,-36 0,-60 C-10,-36 -8,-14 0,0 Z" transform="rotate(19)" stroke-width="0.6"/>
          <path d="M0,0 C8,-13 10,-31 0,-50 C-10,-31 -8,-13 0,0 Z" transform="rotate(38)" stroke-width="0.6"/>
          <ellipse cx="0" cy="-69" rx="4" ry="6.5"/>
          <ellipse cx="-8" cy="-59" rx="3.5" ry="5.6" transform="rotate(-22 -8 -59)"/>
          <ellipse cx="8" cy="-59" rx="3.5" ry="5.6" transform="rotate(22 8 -59)"/>
          <path d="M-22,5 Q0,18 22,5" fill="none" stroke-width="5" stroke-linecap="round"/>
        </g>
      </svg>
      <h1>حصيلة</h1>
    </div>
    <div class="login-tag">لوحة ماليّاتك الشخصية في مكان واحد</div>
    <span class="demo-badge">نسخة تجريبية — بيانات وهمية</span>
    <div class="field">
      <label>رقم الجوال أو الهوية الوطنية</label>
      <input id="login-id" type="text" placeholder="05xxxxxxxx" value="0555123456">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input id="login-pass" type="password" placeholder="••••••••" value="password">
    </div>
    <button class="btn-primary" onclick="doLogin()">دخول</button>
    <div class="login-foot">هذه واجهة تجريبية لعرض الفكرة فقط ولا تتصل بأي بنك حقيقي.<br>جميع الأرقام والحسابات افتراضية.</div>
  </div>
</div>

<script>
function doLogin(){
  localStorage.setItem('hasila_logged_in', '1');
  location.href = 'home.html';
}
</script>
</body>
</html>
