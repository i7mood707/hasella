<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصيلة — تسجيل الدخول</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <h1>حصيلة</h1>
    </div>
    <div class="login-tag">لوحة ماليّاتك الشخصية في مكان واحد</div>
    <div class="field">
      <label>رقم الجوال أو الهوية الوطنية</label>
      <input id="login-id" type="text" placeholder="05xxxxxxxx" value="0555123456">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input id="login-pass" type="password" placeholder="••••••••" value="password">
    </div>
    <button class="btn-primary" onclick="doLogin()">دخول</button>
  </div>
</div>

<script>
function doLogin(){
  localStorage.setItem('hasila_logged_in', '1');
  location.href = 'home.html';
}
</script>
</body>
</html>
