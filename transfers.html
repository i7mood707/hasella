<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصيلة — الحوالات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='19' fill='%233B2415'/%3E%3Ccircle cx='20' cy='20' r='19' fill='none' stroke='%23D9A94E' stroke-width='1.5'/%3E%3Cg transform='translate(20,26)' stroke='%23D9A94E' stroke-width='1.3' fill='%23D9A94E'%3E%3Cpath d='M0,0 C4,-6 5,-14 0,-20 C-5,-14 -4,-6 0,0 Z' transform='rotate(-24)'/%3E%3Cpath d='M0,0 C4,-6 5,-14 0,-20 C-5,-14 -4,-6 0,0 Z'/%3E%3Cpath d='M0,0 C4,-6 5,-14 0,-20 C-5,-14 -4,-6 0,0 Z' transform='rotate(24)'/%3E%3Cpath d='M-7,2 Q0,6 7,2' fill='none'/%3E%3C/g%3E%3C/svg%3E">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="mobile-topbar">
  <button class="mobile-menu-btn" onclick="toggleMobileNav()" aria-label="القائمة">☰</button>
  <span class="mobile-topbar-brand">حصيلة</span>
</div>
<div class="sidebar-overlay" onclick="closeMobileNav()"></div>

<div id="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>حصيلة</h2>
    </div>
    <nav class="nav-list">
      <a class="nav-item" href="home.html"><span class="ic">⌂</span> الرئيسية</a>
      <a class="nav-item" href="debts.html"><span class="ic">▤</span> الديون</a>
      <a class="nav-item" href="stocks.html"><span class="ic">▲</span> الأسهم</a>
      <a class="nav-item" href="financing.html"><span class="ic">◈</span> التمويل</a>
      <a class="nav-item active" href="transfers.html"><span class="ic">⇄</span> الحوالات</a>
      <a class="nav-item" href="advisor.html"><span class="ic">☰</span> المستشار المالي</a>
      <a class="nav-item" href="token.html"><span class="ic">◎</span> التوكن</a>
      <a class="nav-item" href="link.html"><span class="ic">⛓</span> ربط الحسابات</a>
    </nav>
    <div class="sidebar-foot">
      <div class="user-chip">
        <div class="avatar">فع</div>
        <div>
          <div class="uname">فيصل العتيبي</div>
          <div class="urole">حساب تجريبي</div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">تسجيل الخروج</button>
    </div>
  </aside>

  <main class="main">
    <section class="page" id="page-transfers">
      <div class="page-head">
        <div>
          <h1>الحوالات</h1>
          <p>حوالاتك المحلية والدولية وإمكانية أتمتتها</p>
        </div>
      </div>

      <div class="grid grid-2">
        <div class="card">
          <h3>سجل الحوالات</h3>
          <div class="tx-list" id="transfers-list"></div>
          <button class="btn btn-outline btn-sm" style="margin-top:12px;" onclick="openTransferModal()">+ حوالة جديدة</button>
        </div>
        <div class="card">
          <h3>الحوالات التلقائية</h3>
          <p style="font-size:12px; color:var(--text-muted); margin-bottom:14px; line-height:1.8;">فعّل التحويل التلقائي المتكرر لأي جهة أو حساب.</p>
          <div id="automations-list"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<div class="modal-overlay" id="transfer-modal" style="display:none;">
  <div class="modal-box">
    <h3>حوالة جديدة</h3>
    <div style="display:flex; gap:8px; margin-bottom:16px;">
      <button type="button" class="btn btn-sm" id="kind-new" style="flex:1;" onclick="setTransferKind('new')">حوالة جديدة</button>
      <button type="button" class="btn btn-sm" id="kind-auto" style="flex:1;" onclick="setTransferKind('auto')">حوالة تلقائية</button>
    </div>

    <div class="field-block">
      <label class="flabel">من حساب</label>
      <select class="sel" id="transfer-account" onchange="onTransferAccountChange()"></select>
    </div>

    <div class="field-block">
      <label class="flabel">نوع الحوالة</label>
      <select class="sel" id="transfer-type"></select>
    </div>

    <div class="field-block">
      <label class="flabel">اسم المستلم / الجهة</label>
      <input type="text" id="transfer-recipient" placeholder="مثال: عبدالله العتيبي" style="width:100%; padding:11px 12px; border-radius:9px; border:1.5px solid #DAD4C2;">
    </div>

    <div class="field-block">
      <label class="flabel" id="transfer-ref-label">رقم الحساب / الآيبان</label>
      <input type="text" id="transfer-ref" placeholder="SA•• •••• •••• •••• ••••" style="width:100%; padding:11px 12px; border-radius:9px; border:1.5px solid #DAD4C2; font-family:var(--font-mono); direction:ltr; text-align:right;">
    </div>

    <div class="field-block" id="transfer-freq-row" style="display:none;">
      <label class="flabel">التكرار</label>
      <select class="sel" id="transfer-freq">
        <option value="شهريًا">شهريًا</option>
        <option value="أسبوعيًا">أسبوعيًا</option>
        <option value="يوميًا">يوميًا</option>
      </select>
    </div>

    <div class="field-block">
      <label class="flabel">المبلغ</label>
      <input type="number" id="transfer-amount" min="1" placeholder="0.00" style="width:100%; padding:11px 12px; border-radius:9px; border:1.5px solid #DAD4C2; font-family:var(--font-mono);">
    </div>

    <p id="transfer-error" style="font-size:12.5px; color:var(--brick); margin-bottom:10px; display:none;"></p>

    <div style="display:flex; gap:10px;">
      <button class="btn btn-outline" style="flex:1;" onclick="closeTransferModal()">إلغاء</button>
      <button class="btn btn-emerald" style="flex:1;" id="transfer-submit" onclick="confirmTransfer()">تنفيذ الحوالة</button>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script src="assets/data.js"></script>
<script>
requireAuth();

function renderTransfers(){
  document.getElementById('transfers-list').innerHTML = transfersData.map(t=>`
    <div class="tx-row">
      <div class="tx-left">
        <div class="tx-ic">${t.ic}</div>
        <div><div class="tx-name">${t.name}</div><div class="tx-date">${t.date}</div></div>
      </div>
      <div class="tx-amt ${t.amount<0?'neg':'pos'}">${t.amount<0?'-':'+'}${fmt(Math.abs(t.amount))} ${SAR}</div>
    </div>`).join('');

  document.getElementById('automations-list').innerHTML = automations.map((a,i)=>`
    <div class="account-row">
      <div><div class="acc-name">${a.name}</div><div class="acc-type">${a.detail}</div></div>
      <button class="toggle ${a.on?'on':''}" onclick="toggleAuto(${i})"></button>
    </div>`).join('');
}
function toggleAuto(i){
  automations[i].on = !automations[i].on;
  persistState();
  renderTransfers();
}

/* ---------------- New Transfer Modal ---------------- */
let transferKind = 'new';

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(()=>t.classList.remove('show'), 3200);
}

function transferErr(msg){
  const el = document.getElementById('transfer-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function setTransferKind(kind){
  transferKind = kind;
  document.getElementById('kind-new').className = 'btn btn-sm ' + (kind==='new' ? 'btn-emerald' : 'btn-outline');
  document.getElementById('kind-auto').className = 'btn btn-sm ' + (kind==='auto' ? 'btn-emerald' : 'btn-outline');
  document.getElementById('transfer-freq-row').style.display = kind==='auto' ? 'block' : 'none';
  document.getElementById('transfer-submit').textContent = kind==='auto' ? 'تفعيل التحويل التلقائي' : 'تنفيذ الحوالة';
}

function onTransferAccountChange(){
  const acc = accounts[document.getElementById('transfer-account').value];
  const typeSel = document.getElementById('transfer-type');
  typeSel.innerHTML = `
    <option value="internal">تحويل داخل ${acc.bank}</option>
    <option value="local">حوالة محلية (بنك آخر)</option>
    <option value="international">حوالة دولية (SWIFT)</option>
  `;
  onTransferTypeChange();
}

function onTransferTypeChange(){
  const type = document.getElementById('transfer-type').value;
  const label = document.getElementById('transfer-ref-label');
  const input = document.getElementById('transfer-ref');
  if(type==='internal'){ label.textContent = 'رقم الحساب داخل البنك'; input.placeholder = '•••• •••• ••••'; }
  else if(type==='local'){ label.textContent = 'رقم الآيبان (IBAN)'; input.placeholder = 'SA•• •••• •••• •••• ••••'; }
  else { label.textContent = 'رقم الحساب الدولي / SWIFT'; input.placeholder = 'SWIFT / IBAN'; }
}
document.getElementById('transfer-type').addEventListener('change', onTransferTypeChange);

function openTransferModal(){
  document.getElementById('transfer-account').innerHTML = accounts.map((a,i)=>`<option value="${i}">${a.bank} — رصيد ${fmt(a.balance)} ر.س</option>`).join('');
  document.getElementById('transfer-recipient').value = '';
  document.getElementById('transfer-ref').value = '';
  document.getElementById('transfer-amount').value = '';
  document.getElementById('transfer-error').style.display = 'none';
  onTransferAccountChange();
  setTransferKind('new');
  document.getElementById('transfer-modal').style.display = 'flex';
}
function closeTransferModal(){
  document.getElementById('transfer-modal').style.display = 'none';
}

function confirmTransfer(){
  const accIdx = parseInt(document.getElementById('transfer-account').value);
  const acc = accounts[accIdx];
  const type = document.getElementById('transfer-type').value;
  const typeLabel = document.getElementById('transfer-type').selectedOptions[0].textContent;
  const recipient = document.getElementById('transfer-recipient').value.trim();
  const ref = document.getElementById('transfer-ref').value.trim();
  const amount = parseFloat(document.getElementById('transfer-amount').value);

  if(!recipient){ transferErr('اكتب اسم المستلم أو الجهة'); return; }
  if(!ref){ transferErr('اكتب رقم الحساب أو الآيبان'); return; }
  if(!amount || amount<=0){ transferErr('أدخل مبلغًا صحيحًا'); return; }

  const icByType = {internal:'🔁', local:'🏦', international:'🌍'};

  if(transferKind==='new'){
    if(acc.balance < amount){ transferErr(`رصيد ${acc.bank} غير كافٍ لإتمام الحوالة.`); return; }
    acc.balance -= amount;
    transfersData.unshift({name:`${typeLabel} — إلى ${recipient}`, date:'الآن', amount:-amount, ic:icByType[type]});
    persistState();
    renderTransfers();
    closeTransferModal();
    showToast(`تم تنفيذ الحوالة بمبلغ ${fmt(amount)} ر.س من ${acc.bank}.`);
  } else {
    const freq = document.getElementById('transfer-freq').value;
    automations.push({name:`${typeLabel} — إلى ${recipient}`, detail:`${fmt(amount)} ${SAR} ${freq} من ${acc.bank}`, on:true});
    persistState();
    renderTransfers();
    closeTransferModal();
    showToast(`تم تفعيل تحويل تلقائي (${freq}) بمبلغ ${fmt(amount)} ر.س.`);
  }
}

renderTransfers();
</script>
</body>
</html>
