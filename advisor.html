<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حصيلة — المستشار المالي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700;800&family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="mobile-topbar">
  <button class="mobile-menu-btn" onclick="toggleMobileNav()" aria-label="القائمة">☰</button>
  <span class="mobile-topbar-brand">حصيلة</span>
</div>
<div class="sidebar-overlay" onclick="closeMobileNav()"></div>

<div id="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>حصيلة</h2>
    </div>
    <nav class="nav-list">
      <a class="nav-item" href="home.html"><span class="ic">⌂</span> الرئيسية</a>
      <a class="nav-item" href="transfers.html"><span class="ic">⇄</span> الحوالات</a>
      <a class="nav-item" href="token.html"><span class="ic">◎</span> مدّ</a>
      <a class="nav-item" href="debts.html"><span class="ic">▤</span> الديون</a>
      <a class="nav-item" href="stocks.html"><span class="ic">▲</span> الأسهم</a>
      <a class="nav-item" href="financing.html"><span class="ic">◈</span> التمويل</a>
      <a class="nav-item active" href="advisor.html"><span class="ic">☰</span> المستشار المالي</a>
      <a class="nav-item" href="link.html"><span class="ic">⛓</span> ربط الحسابات</a>
    </nav>
    <div class="sidebar-foot">
      <div class="user-chip">
        <div class="avatar">فع</div>
        <div>
          <div class="uname">فيصل العتيبي</div>
          <div class="urole">حساب تجريبي</div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">تسجيل الخروج</button>
    </div>
  </aside>

  <main class="main">
    <section class="page" id="page-advisor">
      <div class="page-head">
        <div>
          <h1>المستشار المالي</h1>
          <p>يرى حساباتك وديونك، ويتوقع احتياجك القادم</p>
        </div>
      </div>
      <div class="chat-wrap">
        <div class="chat-head">
          <div class="seal" style="background:var(--emerald);">🤖</div>
          <div>
            <div style="font-weight:700; font-size:14px;">المستشار المالي</div>
            <div style="font-size:11.5px; color:var(--text-muted);">متصل بحساباتك وديونك الحالية</div>
          </div>
        </div>
        <div class="chat-body" id="chat-body"></div>
        <div class="suggest-row">
          <button class="suggest-chip" onclick="askAdvisor('كيف وضعي المالي هذا الشهر؟')">كيف وضعي المالي هذا الشهر؟</button>
          <button class="suggest-chip" onclick="askAdvisor('هل أقدر أسدد ديوني الحين؟')">هل أقدر أسدد ديوني الحين؟</button>
          <button class="suggest-chip" onclick="askAdvisor('وش أفضل وقت أبيع فيه أسهمي؟')">أفضل وقت لبيع أسهمي؟</button>
        </div>
        <div class="chat-input-row">
          <input id="chat-input" type="text" placeholder="اكتب سؤالك عن وضعك المالي...">
          <button class="btn btn-emerald" onclick="sendChat()">إرسال</button>
        </div>
      </div>
    </section>
  </main>
</div>

<script src="assets/data.js"></script>
<script>
requireAuth();

const chatLog = [
  {who:'bot', text:'أهلًا فيصل 👋 أنا مستشارك المالي، أقدر أطّلع على حساباتك وديونك وأسهمك لأعطيك توقعات ونصائح دقيقة. وش تحب تعرف؟'}
];
function renderChat(){
  document.getElementById('chat-body').innerHTML = chatLog.map(m=>`<div class="msg ${m.who}">${m.text}</div>`).join('');
  const body = document.getElementById('chat-body');
  body.scrollTop = body.scrollHeight;
}
function advisorReply(q){
  const total = accounts.reduce((s,a)=>s+a.balance,0);
  const stocksNet = stocks.reduce((s,st)=>s+st.qty*st.price,0);
  if(q.includes('وضعي') || q.includes('شهر')){
    return `رصيدك الحالي ${fmt(total)} ${SAR}، والتزاماتك الشهرية (أقساط + تابي/تمارا) تقارب 3,890 ${SAR}. بعد خصمها يبقى لديك هامش جيد للادخار، وأنصحك بتحويل جزء منه تلقائيًا لحساب التوفير.`;
  }
  if(q.includes('ديون') || q.includes('اسدد') || q.includes('أسدد')){
    return `إجمالي ديونك الحالية ${fmt(debtsTotal)} ${SAR}. بناءً على رصيدك، تقدر تسدد دفعة تابي القادمة (160 ${SAR}) وتمارا (300 ${SAR}) بدون أي ضغط. تسديد التمويل الشخصي مبكرًا سيوفر عليك فوائد إضافية إذا رغبت.`;
  }
  if(q.includes('أسهم') || q.includes('سهم') || q.includes('بيع')){
    return `صافي محفظتك من الأسهم حاليًا ${fmt(stocksNet)} ${SAR}. سهم سابك يسجل أعلى نمو هذا الأسبوع (+1.2%)، بينما الراجحي في تراجع طفيف (-0.3%). القرار يعتمد على أفقك الاستثماري، لكن لا يوجد مؤشر ضغط يستدعي بيعًا فوريًا.`;
  }
  return `بناءً على بياناتك: رصيدك الإجمالي ${fmt(total)} ${SAR}، وديونك ${fmt(debtsTotal)} ${SAR}، ومحفظة أسهمك ${fmt(stocksNet)} ${SAR}. وضعك المالي مستقر بشكل عام. تحب أفصّل لك أي جزء منها؟`;
}
function sendChat(){
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  askAdvisor(text);
  input.value='';
}
function askAdvisor(q){
  chatLog.push({who:'user', text:q});
  chatLog.push({who:'bot', text:advisorReply(q)});
  renderChat();
}

document.getElementById('chat-input').addEventListener('keydown', e=>{ if(e.key==='Enter') sendChat(); });

renderChat();
const pending = sessionStorage.getItem('hasila_pending_question');
if(pending){
  sessionStorage.removeItem('hasila_pending_question');
  askAdvisor(pending);
}
</script>
</body>
</html>
